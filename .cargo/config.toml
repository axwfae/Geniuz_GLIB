# Embed rpath so the binary finds libonnxruntime.so at runtime
# without LD_LIBRARY_PATH or wrapper scripts.
# $ORIGIN = the directory containing the binary itself.

[target.x86_64-unknown-linux-gnu]
rustflags = ["-C", "link-args=-Wl,-rpath,$ORIGIN/lib"]

[target.aarch64-unknown-linux-gnu]
rustflags = ["-C", "link-args=-Wl,-rpath,$ORIGIN/lib"]

[target.aarch64-apple-darwin]
rustflags = ["-C", "link-args=-Wl,-rpath,@loader_path/lib"]
